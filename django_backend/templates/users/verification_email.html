<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h1 {
      color: #333333;
      font-size: 24px;
      margin-bottom: 20px;
    }
    .verify-button {
      display: inline-block;
      background-color: #007bff;
      color: white;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 4px;
      font-size: 16px;
      margin-top: 30px;
      transition: background-color 0.3s ease;
    }
    .verify-button:hover {
      background-color: #0056b3;
    }
    .footer {
      color: #888888;
      font-size: 12px;
      margin-top: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Verify Your Email</h1>
    <p>Hello,</p>
    <p>Please use the following link to verify your email for FocusBoards:</p>
    <a href="{{ verify_link }}" class="verify-button">Verify Email</a>
    <p class="footer">If you did not request this verification, please ignore this email.</p>
  </div>
</body>
</html>
